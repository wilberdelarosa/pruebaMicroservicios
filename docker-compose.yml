version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: eventos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: eventos_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - eventos-net

  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - EVENT_SERVICE_URL=http://event-service:8083
      - INSCRIP_SERVICE_URL=http://inscrip-service:8084
      - ALLOWED_ORIGINS=http://localhost:8090,http://127.0.0.1:8090,http://localhost:5500,http://127.0.0.1:5500
    depends_on:
      auth-service:
        condition: service_started
      event-service:
        condition: service_started
      inscrip-service:
        condition: service_started
    networks:
      - eventos-net

  auth-service:
    build:
      context: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=eventos_db
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root123}
      - JWT_SECRET=${JWT_SECRET:-my-super-secret-key-at-least-64-characters-long-for-hs512-algorithm-security}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eventos-net

  event-service:
    build:
      context: ./event-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=eventos_db
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root123}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eventos-net

  inscrip-service:
    build:
      context: ./inscrip-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=eventos_db
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root123}
      - JWT_SECRET=${JWT_SECRET:-my-super-secret-key-at-least-64-characters-long-for-hs512-algorithm-security}
      - EVENT_SERVICE_URL=http://event-service:8083
    depends_on:
      mysql:
        condition: service_healthy
      event-service:
        condition: service_started
    networks:
      - eventos-net

  frontend:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - gateway
    networks:
      - eventos-net

volumes:
  mysql_data:

networks:
  eventos-net:
    driver: bridge
