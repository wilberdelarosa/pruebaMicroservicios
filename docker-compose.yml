version: '3.8'

services:
  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - EVENT_SERVICE_URL=http://event-service:8083
      - USER_SERVICE_URL=http://user-service:8082
      - INSCRIP_SERVICE_URL=http://inscrip-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
    depends_on:
      - auth-service
      - event-service
      - inscrip-service

  auth-service:
    build:
      context: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}

  event-service:
    build:
      context: ./event-service
    ports:
      - "8083:8083"
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

  inscrip-service:
    build:
      context: ./inscrip-service
    ports:
      - "8084:8084"
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - EVENT_SERVICE_URL=http://event-service:8083
    depends_on:
      - event-service
