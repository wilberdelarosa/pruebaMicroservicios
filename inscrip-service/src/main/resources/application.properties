spring.application.name=inscrip-service
server.port=8084

spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inscrip_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External Services URLs
event-service.url=${EVENT_SERVICE_URL:http://event-service:8083}

# JWT validation
jwt.secret=${JWT_SECRET:my-super-secret-key-at-least-64-characters-long-for-hs512-algorithm-security}

logging.level.com.eventos=DEBUG
